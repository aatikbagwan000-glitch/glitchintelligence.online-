<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glitch Intelligence | Autonomous AI Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="data_layer.js"></script>
    <script src="analytics_engine.js"></script>
</head>
<body class="bg-black text-white font-mono min-h-screen p-4 md:p-10">
    <div class="max-w-6xl mx-auto flex justify-between items-center mb-10 border-b border-zinc-900 pb-6">
        <div>
            <h1 class="text-3xl font-bold glitch-text">GLITCH_INTELLIGENCE</h1>
            <p class="text-[10px] text-cyan-700 tracking-[0.5em] uppercase mt-1">Autonomous Audit Engine v2.0</p>
        </div>
        <div class="flex gap-3">
            <button onclick="DataManager.pushEvent('Auth', 'Login_Click', 'Header')" class="text-[9px] border border-zinc-800 px-4 py-2 hover:bg-zinc-900 transition-all uppercase">Login</button>
            <button onclick="DataManager.pushEvent('Auth', 'Signup_Click', 'Header')" class="text-[9px] border border-cyan-500 px-4 py-2 bg-cyan-950/30 hover:bg-cyan-900 transition-all uppercase text-cyan-400">Join_Network</button>
        </div>
    </div>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-1 space-y-6">
            <div class="bg-zinc-950 border border-zinc-900 p-6 rounded-lg">
                <h3 class="text-xs font-bold text-zinc-500 mb-4 uppercase tracking-widest">Data_Ingestion</h3>
                <label class="border-2 border-dashed border-zinc-800 p-8 block rounded-lg hover:border-cyan-500 cursor-pointer bg-black/50 text-center transition-all">
                    <input type="file" id="csvPicker" accept=".csv" class="hidden">
                    <p id="statusText" class="text-zinc-600 text-[10px] uppercase">Drop Inventory CSV</p>
                </label>
            </div>
            <div class="bg-zinc-950 border border-zinc-900 p-6 rounded-lg">
                <h3 class="text-xs font-bold text-zinc-500 mb-4 uppercase tracking-widest">System_Health</h3>
                <div class="space-y-3 text-[10px]">
                    <div class="flex justify-between"><span class="text-zinc-600">AI CORE:</span><span class="text-cyan-400">GEMINI_1.5_FLASH</span></div>
                    <div class="flex justify-between"><span class="text-zinc-600">LOCATION:</span><span class="text-white">PUNE_NODE_IN</span></div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-2 space-y-6">
            <div class="bg-zinc-950 border border-zinc-900 p-6 rounded-lg h-64">
                <canvas id="glitchChart"></canvas>
            </div>
            <div class="bg-black border border-zinc-900 rounded-lg overflow-hidden">
                <div class="bg-zinc-900/50 px-4 py-2 flex justify-between items-center border-b border-zinc-800">
                    <span class="text-[10px] text-zinc-400 uppercase font-bold">Live_Audit_Log</span>
                    <span id="aiStatus" class="text-[9px] text-zinc-500 uppercase">● Idle</span>
                </div>
                <div id="terminal" class="p-4 h-64 overflow-y-auto text-[10px] space-y-1 terminal-scroll">
                    <p class="text-zinc-700 italic">Waiting for data stream...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 1. Initialize Chart
        const ctx = document.getElementById('glitchChart').getContext('2d');
        const glitchChart = new Chart(ctx, {
            type: 'line',
            data: { labels: ['0s','5s','10s','15s','20s','25s'], datasets: [{ data: [0,0,0,0,0,0], borderColor: '#06b6d4', tension: 0.4 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { display: false } } }
        });

        // 2. Audit Function
        document.getElementById('csvPicker').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const terminal = document.getElementById('terminal');
            if (file) {
                document.getElementById('statusText').innerText = "AUDITING: " + file.name;
                terminal.innerHTML = `<p class="text-cyan-500">>>> INITIATING SECURE HANDSHAKE...</p>`;
                
                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const results = await AnalyticsEngine.callAI(event.target.result);
                        const lines = results.split('\n');
                        lines.forEach((line, i) => {
                            setTimeout(() => {
                                const log = document.createElement('p');
                                const isGlitch = line.toLowerCase().includes('risk') || line.toLowerCase().includes('glitch');
                                log.className = isGlitch ? "text-red-500 font-bold" : "text-zinc-500";
                                log.innerText = `[AI_AUDIT] >> ${line}`;
                                terminal.appendChild(log);
                                terminal.scrollTop = terminal.scrollHeight;
                                
                                glitchChart.data.datasets[0].data.shift();
                                glitchChart.data.datasets[0].data.push(isGlitch ? 90 : 10);
                                glitchChart.update();
                            }, i * 300);
                        });
                    } catch (err) {
                        terminal.innerHTML += `<p class="text-red-600">>>> CRITICAL_ERROR: CHECK API_KEY IN ANALYTICS_ENGINE.JS</p>`;
                    }
                };
                reader.readAsText(file);
            }
        });
    </script>
</body>
</html>
