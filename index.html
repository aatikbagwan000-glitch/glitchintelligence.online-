<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glitch Intelligence | Enterprise AI Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="data_layer.js"></script>
    <script src="analytics_engine.js"></script>
    <script src="theme_engine.js"></script>
</head>
<body class="bg-[#0a0a0c] text-slate-300 font-sans flex min-h-screen">

    <aside class="w-64 border-r border-zinc-900 flex flex-col p-6 space-y-8 bg-black">
        <div class="text-white font-bold tracking-tighter text-xl">GLITCH_INTEL</div>
        
        <nav class="flex-1 space-y-2 text-xs uppercase tracking-widest">
            <a href="#" class="block p-3 bg-zinc-900 text-cyan-400 rounded-lg">Overview</a>
            <a href="#" class="block p-3 hover:bg-zinc-900 rounded-lg transition">Keyword_Audit</a>
            <a href="#" class="block p-3 hover:bg-zinc-900 rounded-lg transition">Financial_Glitch</a>
            <a href="#" class="block p-3 hover:bg-zinc-900 rounded-lg transition">Inventory_AI</a>
        </nav>

        <div class="border-t border-zinc-900 pt-6">
            <button onclick="ThemeEngine.toggle()" id="themeBtn" class="w-full text-[10px] border border-zinc-800 py-2 rounded">MODE: DARK</button>
        </div>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto">
        <header class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-bold text-white">Dashboard_v3.0</h2>
            <div class="flex gap-4">
                <button class="bg-cyan-600 text-black px-6 py-2 text-xs font-bold rounded shadow-lg shadow-cyan-900/20">UPGRADE_PRO</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="p-6 bg-zinc-950 border border-zinc-900 rounded-xl">
                <p class="text-[10px] text-zinc-500 mb-1">TOTAL_AUDITS</p>
                <h4 class="text-3xl font-bold text-white">1,284</h4>
            </div>
            <div class="p-6 bg-zinc-950 border border-zinc-900 rounded-xl">
                <p class="text-[10px] text-zinc-500 mb-1">GLITCHES_CAUGHT</p>
                <h4 class="text-3xl font-bold text-red-500">42</h4>
            </div>
            <div class="p-6 bg-zinc-950 border border-zinc-900 rounded-xl">
                <p class="text-[10px] text-zinc-500 mb-1">DATA_HEALTH</p>
                <h4 class="text-3xl font-bold text-green-500">98.2%</h4>
            </div>
        </div>

        <section class="bg-zinc-950 border border-zinc-900 rounded-2xl p-8">
            <div class="mb-6">
                <h3 class="font-bold text-white">AI_ANOMALY_DETECTOR</h3>
                <p class="text-[10px] text-zinc-500">UPLOAD CSV TO INITIATE MULTI-NODE SCAN</p>
            </div>
            <input type="file" id="csvPicker" class="block w-full text-xs text-zinc-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-zinc-900 file:text-cyan-400 hover:file:bg-zinc-800 cursor-pointer">
            <div id="terminal" class="mt-6 p-4 bg-black rounded-lg h-48 overflow-y-auto text-[10px] font-mono border border-zinc-900">
                <p class="text-zinc-700 italic">SYSTEM_READY...</p>
            </div>
        </section>
    </main>
</body>
</html>
