<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glitch Intelligence | Autonomous AI Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glitch-text { text-shadow: 2px 0 #ff00c1, -2px 0 #00fff9; animation: noise 2s infinite; }
        @keyframes noise { 0% { transform: translate(0); } 10% { transform: translate(-2px, 2px); } 100% { transform: translate(0); } }
    </style>
</head>
<body class="bg-black text-white font-mono min-h-screen p-6">
    <div class="max-w-4xl mx-auto flex justify-between items-center mb-10">
        <h1 class="text-2xl font-bold glitch-text">GLITCH_INTELLIGENCE</h1>
        <div class="flex gap-4">
            <button onclick="toggleAuth('login')" class="text-[10px] border border-cyan-900 px-4 py-2 hover:bg-cyan-900 transition-all uppercase">User_Login</button>
            <button onclick="toggleAuth('signup')" class="text-[10px] border border-cyan-500 px-4 py-2 bg-cyan-950 hover:bg-cyan-900 transition-all uppercase">Create_Account</button>
        </div>
    </div>

    <div class="max-w-2xl mx-auto text-center p-8 border-2 border-cyan-500 rounded-lg bg-zinc-950/50">
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-zinc-900 p-4 border border-zinc-800 rounded">
                <p class="text-[10px] text-zinc-500 uppercase">System</p>
                <p class="text-green-500 text-sm">● ONLINE</p>
            </div>
            <div class="bg-zinc-900 p-4 border border-zinc-800 rounded">
                <p class="text-[10px] text-zinc-500 uppercase">Core</p>
                <p class="text-white text-sm">GEMINI 1.5 FLASH</p>
            </div>
        </div>

        <label class="border-2 border-dashed border-zinc-800 p-10 block rounded-lg hover:border-cyan-500 cursor-pointer bg-zinc-900/30">
            <input type="file" id="csvPicker" accept=".csv" class="hidden">
            <p id="statusText" class="text-zinc-500 text-xs">DROP INVENTORY CSV FOR AI AUDIT</p>
        </label>

        <div id="results" class="hidden mt-6 text-left bg-black border border-zinc-800 p-4 rounded h-40 overflow-y-auto">
            <pre id="output" class="text-[10px] text-cyan-500"></pre>
        </div>
    </div>

    <div id="authModal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center p-4 z-50">
        <div class="max-w-md w-full border-2 border-cyan-500 bg-zinc-950 p-8 rounded">
            <h2 id="modalTitle" class="text-xl font-bold mb-6 text-cyan-400 uppercase">Access_Terminal</h2>
            <input type="email" placeholder="EMAIL" class="w-full bg-black border border-zinc-800 p-3 mb-4 text-sm">
            <input type="password" placeholder="PASSWORD" class="w-full bg-black border border-zinc-800 p-3 mb-6 text-sm">
            <button class="w-full bg-cyan-600 py-3 text-black font-bold text-sm">INITIALIZE</button>
            <button onclick="toggleAuth()" class="w-full mt-4 text-[10px] text-zinc-600 hover:text-red-500 uppercase">Exit</button>
        </div>
    </div>

    <script>
        function toggleAuth(type) {
            const modal = document.getElementById('authModal');
            if(type) document.getElementById('modalTitle').innerText = type + "_ACCESS";
            modal.classList.toggle('hidden');
        }

        document.getElementById('csvPicker').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('statusText').innerText = "SCANNING: " + file.name;
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('results').classList.remove('hidden');
                    document.getElementById('output').textContent = ">>> DATA_LOCKED\n>>> ANALYSIS_PENDING_LOGIN\n\n" + event.target.result;
                };
                reader.readAsText(file);
            }
        });
    </script>
</body>
</html>
