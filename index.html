<script>
    const API_KEY = "YOUR_GEMINI_API_KEY_HERE"; // Replace with your real key
    const csvPicker = document.getElementById('csvPicker');
    const output = document.getElementById('output');
    const results = document.getElementById('results');

    csvPicker.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // Visual feedback for scan start
        results.classList.remove('hidden');
        output.textContent = ">>> INITIALIZING AI AUDIT...\n>>> ANALYZING DATA STRUCTURE...";

        const reader = new FileReader();
        reader.onload = async (event) => {
            const csvData = event.target.result;
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `Act as an expert Data Auditor for Glitch Intelligence. 
                                Scan the following CSV data for anomalies, inconsistencies, or 'glitches'.
                                List exactly what is wrong for each row affected.
                                DATA: ${csvData}`
                            }]
                        }]
                    })
                });

                const json = await response.json();
                const findings = json.candidates[0].content.parts[0].text;
                
                // Display the actual AI findings instead of raw data
                output.textContent = ">>> GLITCH REPORT GENERATED:\n\n" + findings;
            } catch (err) {
                output.textContent = ">>> ERROR: CONNECTION_FAILED\n>>> CHECK API_KEY CONFIGURATION";
            }
        };
        reader.readAsText(file);
    });
</script>
