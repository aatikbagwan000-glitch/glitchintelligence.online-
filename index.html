<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glitch Intelligence | Enterprise AI SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    <script src="engine.js" defer></script>
    <script src="app.js" defer></script>
</head>
<body class="bg-[#050505] text-slate-400 font-sans flex h-screen overflow-hidden">

    <aside class="w-64 border-r border-zinc-900 bg-black flex flex-col p-6">
        <div class="mb-10">
            <h1 class="text-white text-xl font-bold tracking-tighter">GLITCH_INTEL <span class="text-cyan-500 text-[10px]">v3.0</span></h1>
        </div>
        
        <nav class="flex-1 space-y-1">
            <button onclick="App.showTab('audit')" class="w-full text-left p-3 rounded-lg bg-zinc-900 text-white text-xs uppercase tracking-widest font-bold">AI_Audit_Tool</button>
            <button onclick="App.showTab('market')" class="w-full text-left p-3 rounded-lg hover:bg-zinc-900 text-xs uppercase tracking-widest transition">Market_Trends</button>
            <button onclick="App.showTab('config')" class="w-full text-left p-3 rounded-lg hover:bg-zinc-900 text-xs uppercase tracking-widest transition">Settings</button>
        </nav>

        <div class="pt-6 border-t border-zinc-900">
            <div class="bg-zinc-900 p-4 rounded-lg text-[10px]">
                <p class="text-zinc-500">API_STATUS:</p>
                <p id="apiIndicator" class="text-green-500 font-bold">CONNECTING...</p>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto">
        <header class="p-6 border-b border-zinc-900 flex justify-between items-center bg-black/50 backdrop-blur-md sticky top-0 z-50">
            <h2 id="tabTitle" class="text-white font-bold uppercase tracking-widest text-sm">AI_Audit_Tool</h2>
            <div class="flex gap-4">
                <button class="bg-cyan-600 text-black px-4 py-2 text-[10px] font-bold rounded uppercase">Upgrade_To_Pro</button>
            </div>
        </header>

        <section id="content" class="p-8 max-w-5xl mx-auto w-full">
            <div class="grid grid-cols-1 gap-6">
                <div class="bg-zinc-950 border border-zinc-900 p-8 rounded-2xl">
                    <h3 class="text-white mb-2 font-bold">Data_Anomaly_Scanner</h3>
                    <p class="text-[10px] text-zinc-500 mb-6">Drop CSV for deep-learning anomaly detection</p>
                    
                    <label class="border-2 border-dashed border-zinc-800 p-12 block rounded-xl hover:border-cyan-500 cursor-pointer bg-black/40 text-center transition-all">
                        <input type="file" id="csvPicker" accept=".csv" class="hidden">
                        <span id="fileStatus" class="text-xs uppercase text-zinc-600">Click to upload audit file</span>
                    </label>
                </div>

                <div class="bg-black border border-zinc-900 rounded-xl overflow-hidden shadow-2xl">
                    <div class="bg-zinc-900/50 p-3 border-b border-zinc-800 flex justify-between">
                        <span class="text-[9px] font-bold uppercase">Live_Audit_Terminal</span>
                        <button onclick="App.clearLogs()" class="text-[9px] text-zinc-500 hover:text-white uppercase">Clear</button>
                    </div>
                    <div id="terminal" class="p-6 h-64 overflow-y-auto font-mono text-[10px] space-y-1">
                        <p class="text-zinc-700 italic">SYSTEM_IDLE: Waiting for data input...</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

</body>
</html>
