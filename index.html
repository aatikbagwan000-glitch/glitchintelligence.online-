<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glitch Intelligence | Enterprise AI SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="engine.js" defer></script>
    <script src="app.js" defer></script>
</head>
<body class="bg-[#050505] text-slate-400 font-sans flex h-screen overflow-hidden">

    <aside class="w-64 border-r border-zinc-900 bg-black flex flex-col p-6">
        <div class="mb-10">
            <h1 class="text-white text-xl font-bold tracking-tighter uppercase">GLITCH_INTEL <span class="text-cyan-500 text-[10px]">v3.0</span></h1>
        </div>
        <nav class="flex-1 space-y-2">
            <button onclick="App.showTab('audit')" class="w-full text-left p-3 rounded-lg bg-zinc-900 text-white text-[10px] uppercase tracking-widest font-bold">AI_Audit_Tool</button>
            <button class="w-full text-left p-3 rounded-lg hover:bg-zinc-900 text-[10px] uppercase tracking-widest transition">Market_Analysis</button>
            <button class="w-full text-left p-3 rounded-lg hover:bg-zinc-900 text-[10px] uppercase tracking-widest transition">API_Settings</button>
        </nav>
        <div class="pt-6 border-t border-zinc-900">
            <p class="text-[9px] text-zinc-600 uppercase mb-2">System_Status</p>
            <div id="statusPulse" class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                <span class="text-[10px] text-green-500 font-bold uppercase tracking-tighter">Node: Pune_IN_Active</span>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto">
        <header class="p-6 border-b border-zinc-900 flex justify-between items-center bg-black/50 backdrop-blur-md sticky top-0 z-50">
            <h2 id="tabTitle" class="text-white font-bold uppercase tracking-widest text-xs">AI_Audit_Dashboard</h2>
            <button class="bg-cyan-600 text-black px-4 py-2 text-[10px] font-bold rounded uppercase hover:bg-cyan-500 transition-all">Upgrade_to_Enterprise</button>
        </header>

        <section id="content" class="p-8 max-w-5xl mx-auto w-full space-y-8">
            <div class="bg-zinc-950 border border-zinc-900 p-10 rounded-2xl shadow-2xl">
                <h3 class="text-white mb-2 font-bold uppercase text-sm tracking-tight">Autonomous Anomaly Scanner</h3>
                <p class="text-[10px] text-zinc-500 mb-8 uppercase tracking-widest">Identify data glitches using Gemini 1.5 Flash</p>
                
                <label class="border-2 border-dashed border-zinc-800 p-16 block rounded-xl hover:border-cyan-500 cursor-pointer bg-black/40 text-center transition-all group">
                    <input type="file" id="csvPicker" accept=".csv" class="hidden">
                    <span id="fileStatus" class="text-xs uppercase text-zinc-600 group-hover:text-cyan-400">Click to upload audit data stream</span>
                </label>
            </div>

            <div class="bg-black border border-zinc-900 rounded-xl overflow-hidden">
                <div class="bg-zinc-900/50 p-3 border-b border-zinc-800 flex justify-between items-center">
                    <span class="text-[9px] font-bold uppercase text-zinc-400 tracking-widest">Secure_Terminal_Output</span>
                    <span class="text-[9px] text-zinc-600 uppercase">Latency: 24ms</span>
                </div>
                <div id="terminal" class="p-6 h-72 overflow-y-auto font-mono text-[10px] space-y-1 bg-zinc-950/30">
                    <p class="text-zinc-700 italic">>>> [SYSTEM] Awaiting encrypted data packet...</p>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
