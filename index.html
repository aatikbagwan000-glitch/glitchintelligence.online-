<div class="flex gap-4 justify-end mb-4">
    <button onclick="toggleAuth('login')" class="text-[10px] border border-cyan-900 px-3 py-1 hover:bg-cyan-900 transition-all">USER_LOGIN</button>
    <button onclick="toggleAuth('signup')" class="text-[10px] border border-cyan-900 px-3 py-1 hover:bg-cyan-900 transition-all">CREATE_ACCOUNT</button>
</div>

<div id="authModal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="max-w-md w-full border-2 border-cyan-500 bg-zinc-950 p-8 rounded-lg shadow-[0_0_50px_rgba(0,255,249,0.2)]">
        <h2 id="authTitle" class="text-2xl font-bold glitch-text mb-6">SECURE_ACCESS</h2>
        <form class="space-y-4">
            <input type="email" placeholder="ENCRYPTED_EMAIL" class="w-full bg-black border border-zinc-800 p-3 text-cyan-500 focus:border-cyan-500 outline-none">
            <input type="password" placeholder="ACCESS_KEY" class="w-full bg-black border border-zinc-800 p-3 text-cyan-500 focus:border-cyan-500 outline-none">
            <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-400 text-black font-bold py-3 transition-all">INITIALIZE_SESSION</button>
        </form>
        <button onclick="toggleAuth()" class="mt-4 text-[10px] text-zinc-600 hover:text-red-500">EXIT_TERMINAL</button>
    </div>
</div>

<script>
    function toggleAuth(type) {
        const modal = document.getElementById('authModal');
        const title = document.getElementById('authTitle');
        modal.classList.toggle('hidden');
        if(type) title.innerText = type.toUpperCase() + "_ACCESS";
    }
</script>
