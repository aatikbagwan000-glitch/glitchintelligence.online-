<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glitch Intelligence | Autonomous AI Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .glitch-text { text-shadow: 2px 0 #ff00c1, -2px 0 #00fff9; animation: noise 2s infinite; }
        @keyframes noise { 0% { transform: translate(0); } 10% { transform: translate(-2px, 2px); } 100% { transform: translate(0); } }
        .terminal-scroll::-webkit-scrollbar { width: 4px; }
        .terminal-scroll::-webkit-scrollbar-thumb { background: #1e1e1e; }
    </style>
</head>
<body class="bg-black text-white font-mono min-h-screen p-4 md:p-10">
    <div class="max-w-6xl mx-auto flex justify-between items-center mb-10 border-b border-zinc-900 pb-6">
        <div>
            <h1 class="text-3xl font-bold glitch-text">GLITCH_INTELLIGENCE</h1>
            <p class="text-[10px] text-cyan-700 tracking-[0.5em] uppercase mt-1">Autonomous Audit Engine v2.0</p>
        </div>
        <div class="flex gap-3">
            <button onclick="toggleAuth('login')" class="text-[9px] border border-zinc-800 px-4 py-2 hover:bg-zinc-900 transition-all uppercase">Login</button>
            <button onclick="toggleAuth('signup')" class="text-[9px] border border-cyan-500 px-4 py-2 bg-cyan-950/30 hover:bg-cyan-900 transition-all uppercase text-cyan-400">Join_Network</button>
        </div>
    </div>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-1 space-y-6">
            <div class="bg-zinc-950 border border-zinc-900 p-6 rounded-lg">
                <h3 class="text-xs font-bold text-zinc-500 mb-4 uppercase tracking-widest">Data_Ingestion</h3>
                <label class="border-2 border-dashed border-zinc-800 p-8 block rounded-lg hover:border-cyan-500 cursor-pointer bg-black/50 text-center transition-all">
                    <input type="file" id="csvPicker" accept=".csv" class="hidden">
                    <p id="statusText" class="text-zinc-600 text-[10px] uppercase">Drop Inventory CSV</p>
                </label>
            </div>

            <div class="bg-zinc-950 border border-zinc-900 p-6 rounded-lg">
                <h3 class="text-xs font-bold text-zinc-500 mb-4 uppercase tracking-widest">System_Health</h3>
                <div class="space-y-3">
                    <div class="flex justify-between text-[10px]"><span class="text-zinc-600">AI CORE:</span><span class="text-cyan-400">GEMINI_1.5_FLASH</span></div>
                    <div class="flex justify-between text-[10px]"><span class="text-zinc-600">STATUS:</span><span id="aiStatus" class="text-green-500">READY</span></div>
                    <div class="flex justify-between text-[10px]"><span class="text-zinc-600">LOCATION:</span><span class="text-white">PUNE_NODE_IN</span></div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-2 space-y-6">
            <div class="bg-zinc-950 border border-zinc-900 p-6 rounded-lg h-64">
                <canvas id="glitchChart"></canvas>
            </div>

            <div class="bg-black border border-zinc-900 rounded-lg overflow-hidden">
                <div class="bg-zinc-900/50 px-4 py-2 flex justify-between items-center border-b border-zinc-800">
                    <span class="text-[10px] text-zinc-400 uppercase font-bold">Live_Audit_Log</span>
                    <span id="streamIndicator" class="text-[9px] text-zinc-500 uppercase">● Idle</span>
                </div>
                <div id="terminal" class="p-4 h-64 overflow-y-auto text-[10px] space-y-1 terminal-scroll">
                    <p class="text-zinc-700 italic">Waiting for data stream...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_KEY = "YOUR_GEMINI_API_KEY"; // Replace with your real key
        const terminal = document.getElementById('terminal');
        const streamIndicator = document.getElementById('streamIndicator');

        function toggleAuth(type) {
            alert(type.toUpperCase() + " module initializing...");
        }

        // Initialize Chart
        const ctx = document.getElementById('glitchChart').getContext('2d');
        const glitchChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['0s', '5s', '10s', '15s', '20s', '25s'],
                datasets: [{
                    label: 'Anomaly Detection',
                    data: [0, 0, 0, 0, 0, 0],
                    borderColor: '#06b6d4',
                    borderWidth: 2,
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(6, 182, 212, 0.1)'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { y: { display: false }, x: { display: false } },
                plugins: { legend: { display: false } }
            }
        });

        async function startAiAudit(csvContent) {
            terminal.innerHTML = `<p class="text-cyan-500">>>> INITIATING SECURE HANDSHAKE...</p>`;
            streamIndicator.className = "text-[9px] text-green-500 animate-pulse";
            streamIndicator.innerText = "● STREAMING";

            const prompt = `AUDIT TASK: Analyze this CSV data. 
            Identify specific 'glitches' like inconsistent medical grades, high-risk HbA1c (>9), or data gaps.
            Be concise. FORMAT: [ROW_ID] - [FINDING].
            DATA: ${csvContent}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                const findings = data.candidates[0].content.parts[0].text;
                const lines = findings.split('\n');

                let i = 0;
                const interval = setInterval(() => {
                    if (i >= lines.length) {
                        clearInterval(interval);
                        terminal.innerHTML += `<p class="text-green-500 font-bold mt-2">>>> AUDIT_COMPLETE</p>`;
                        streamIndicator.className = "text-[9px] text-zinc-500";
                        streamIndicator.innerText = "● Idle";
                        return;
                    }

                    const log = document.createElement('p');
                    const isGlitch = lines[i].toLowerCase().includes('risk') || lines[i].toLowerCase().includes('glitch');
                    log.className = isGlitch ? "text-red-500" : "text-zinc-400";
                    log.innerText = `[${new Date().toLocaleTimeString()}] >> ${lines[i]}`;
                    terminal.appendChild(log);
                    terminal.scrollTop = terminal.scrollHeight;

                    // Update Chart based on actual AI findings
                    glitchChart.data.datasets[0].data.shift();
                    glitchChart.data.datasets[0].data.push(isGlitch ? 90 : 10);
                    glitchChart.update();
                    
                    i++;
                }, 400);

            } catch (err) {
                terminal.innerHTML += `<p class="text-red-600">>>> CRITICAL_ERROR: CONNECTION_FAILED</p>`;
            }
        }

        document.getElementById('csvPicker').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('statusText').innerText = "AUDITING: " + file.name;
                const reader = new FileReader();
                reader.onload = (event) => startAiAudit(event.target.result);
                reader.readAsText(file);
            }
        });
    </script>
</body>
</html>
<link rel="stylesheet" href="styles.css">
<script src="analytics_engine.js"></script>
