<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glitch Intel | Insights Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="engine.js" defer></script>
    <script src="app.js" defer></script>
</head>
<body class="bg-[#0B0D10] text-[#E9EEF5] flex h-screen font-sans overflow-hidden">

    <aside class="w-64 bg-[#050608] border-r border-[#273140] flex flex-col p-6 space-y-8">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-[#40E0FF] rounded-lg shadow-[0_0_15px_rgba(64,224,255,0.4)]"></div>
            <h1 class="font-bold text-lg tracking-tight text-white">GLITCH_INTEL</h1>
        </div>
        
        <nav class="flex-1 space-y-1">
            <p class="text-[9px] text-[#273140] font-bold uppercase mb-2 tracking-widest">Growth_Tools</p>
            <button onclick="App.showTab('audit')" class="w-full text-left p-3 rounded-md bg-[#151A21] text-[#40E0FF] text-[11px] font-bold uppercase tracking-wide">Insights_Audit</button>
            <button class="w-full text-left p-3 rounded-md hover:bg-[#151A21] text-[11px] uppercase tracking-wide transition">Market_Tracker</button>
            <button class="w-full text-left p-3 rounded-md hover:bg-[#151A21] text-[11px] uppercase tracking-wide transition">Keyword_Wiki</button>
        </nav>

        <div class="pt-6 border-t border-[#273140]">
            <button onclick="ThemeEngine.toggle()" class="w-full text-[10px] bg-zinc-900 border border-zinc-800 py-2 rounded text-zinc-500 hover:text-white uppercase transition">System_Settings</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto">
        <header class="p-6 border-b border-[#273140] flex justify-between items-center bg-[#0B0D10]/80 backdrop-blur-md sticky top-0 z-50">
            <div>
                <h2 id="tabTitle" class="text-white font-bold text-xl uppercase tracking-tight">Insights_Dashboard</h2>
                <p class="text-[10px] text-[#40E0FF] font-bold">NODE_PUNE_ACTIVE // SECURE_STREAM</p>
            </div>
            <button class="bg-[#40E0FF] text-black px-5 py-2 text-[10px] font-extrabold rounded uppercase tracking-tighter hover:scale-105 transition-transform shadow-lg shadow-[#40E0FF]/10">Upgrade_to_Agency</button>
        </header>

        <section id="content" class="p-8 max-w-6xl w-full mx-auto space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-[#151A21] border border-[#273140] p-6 rounded-xl">
                    <p class="text-[9px] text-zinc-500 uppercase tracking-widest">Data_Health</p>
                    <h4 class="text-3xl font-bold text-green-500">98.4%</h4>
                </div>
                <div class="bg-[#151A21] border border-[#273140] p-6 rounded-xl">
                    <p class="text-[9px] text-zinc-500 uppercase tracking-widest">Glitches_Found</p>
                    <h4 class="text-3xl font-bold text-red-500">12</h4>
                </div>
                <div class="bg-[#151A21] border border-[#273140] p-6 rounded-xl">
                    <p class="text-[9px] text-zinc-500 uppercase tracking-widest">Audit_Uptime</p>
                    <h4 class="text-3xl font-bold text-white">24/7</h4>
                </div>
            </div>

            <div class="bg-[#151A21] border border-[#273140] p-8 rounded-2xl">
                <div class="mb-8">
                    <span class="bg-[#40E0FF]/10 text-[#40E0FF] text-[8px] font-bold px-2 py-1 rounded-full uppercase">Gemini_1.5_Flash</span>
                    <h3 class="text-white mt-2 font-bold uppercase text-base">Anomaly_Scanner</h3>
                </div>
                
                <label class="border-2 border-dashed border-[#273140] p-20 block rounded-xl hover:border-[#40E0FF] cursor-pointer bg-black/40 text-center transition-all group">
                    <input type="file" id="csvPicker" accept=".csv" class="hidden">
                    <span id="fileStatus" class="text-xs uppercase text-zinc-500 group-hover:text-[#40E0FF]">Upload Data Stream to Begin Scan</span>
                </label>
            </div>

            <div class="bg-black border border-[#273140] rounded-xl overflow-hidden shadow-2xl">
                <div class="bg-[#151A21] p-3 border-b border-[#273140] flex justify-between">
                    <span class="text-[9px] font-bold uppercase tracking-widest text-[#40E0FF]">Live_Audit_Terminal</span>
                    <span class="text-[9px] text-zinc-600 uppercase">Latency: 14ms</span>
                </div>
                <div id="terminal" class="p-6 h-64 overflow-y-auto font-mono text-[10px] space-y-1 bg-[#050608]">
                    <p class="text-zinc-700 italic">>>> [SYSTEM] Awaiting encrypted data packet...</p>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
